<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏸 Badminton Matcher</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090f;
    --surface: #0f1623;
    --surface2: #161f30;
    --surface3: #1c2840;
    --accent: #f0c040;
    --accent2: #ff6b35;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #f1f5f9;
    --muted: #64748b;
    --border: #1e3a5f;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(240,192,64,0.07) 0%,transparent 70%);}
  h1,h2,h3{font-family:'Kanit',sans-serif;}

  /* SCREENS */
  .screen{display:none;min-height:100vh;}
  .screen.active{display:flex;flex-direction:column;}

  /* ===== LOBBY SCREEN ===== */
  #s-lobby{align-items:center;justify-content:center;padding:24px 16px;}
  .lobby-box{width:100%;max-width:420px;}
  .logo{text-align:center;margin-bottom:40px;}
  .logo-icon{font-size:64px;display:block;filter:drop-shadow(0 0 30px rgba(240,192,64,0.5));animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .logo h1{font-size:36px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;}
  .logo p{color:var(--muted);font-size:13px;margin-top:4px;}

  .lobby-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:16px;}
  .lobby-card h2{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--accent);}
  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

  /* ===== SETUP SCREEN ===== */
  #s-setup{padding:0;}
  .top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .top-bar h2{font-size:16px;font-weight:700;}
  .room-code-badge{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 12px;font-family:'Kanit',sans-serif;font-size:13px;color:var(--accent);font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;}
  .room-code-badge:hover{border-color:var(--accent);}

  .setup-body{flex:1;overflow-y:auto;padding:16px;}
  .tabs{display:flex;gap:4px;background:var(--surface);border-radius:12px;padding:4px;margin-bottom:20px;border:1px solid var(--border);}
  .tab{flex:1;padding:9px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-family:'Kanit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
  .tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#07090f;}

  /* ===== MATCH SCREEN ===== */
  #s-match{padding:0;}

  /* ===== SHARED COMPONENTS ===== */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;}
  .card-title{font-family:'Kanit',sans-serif;font-size:15px;font-weight:700;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:8px;}

  label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
  input[type=text],input[type=number],select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 14px;font-family:'Sarabun',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;}
  input:focus,select:focus{border-color:var(--accent);}
  select option{background:var(--surface);}

  .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
  .form-group{flex:1;min-width:110px;}

  .btn{padding:11px 20px;border:none;border-radius:10px;font-family:'Kanit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#07090f;width:100%;font-size:16px;padding:14px;border-radius:12px;}
  .btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);width:100%;padding:12px;}
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
  .btn-sm{padding:6px 14px;font-size:13px;border-radius:8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn-sm:hover{border-color:var(--accent);color:var(--accent);}
  .btn-sm.on{border-color:var(--accent);color:var(--accent);}
  .btn-danger{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
  .btn-danger:hover{background:rgba(239,68,68,0.25);}

  .player-input-row{display:flex;gap:8px;margin-bottom:10px;}
  .player-input-row input{flex:1;}
  .players-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
  .player-chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:13px;animation:popIn 0.2s ease;}
  .player-chip .num{color:var(--accent);font-size:11px;font-weight:700;}
  .player-chip .del{cursor:pointer;color:var(--muted);font-size:15px;transition:color 0.15s;}
  .player-chip .del:hover{color:var(--red);}
  @keyframes popIn{from{transform:scale(0.8);opacity:0;}to{transform:scale(1);opacity:1;}}

  .notice{background:rgba(240,192,64,0.07);border:1px solid rgba(240,192,64,0.2);border-radius:10px;padding:11px 14px;font-size:13px;color:rgba(240,192,64,0.85);margin-bottom:14px;line-height:1.5;}
  .error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:11px 14px;font-size:13px;color:#fca5a5;margin-bottom:14px;}
  .success-msg{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:10px;padding:11px 14px;font-size:13px;color:#86efac;margin-bottom:14px;}

  /* ROUND DISPLAY */
  .match-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;}
  .round-pills{display:flex;gap:5px;flex-wrap:wrap;}
  .r-pill{padding:5px 12px;border-radius:8px;border:none;font-family:'Kanit',sans-serif;font-size:12px;font-weight:700;background:var(--surface2);color:var(--muted);border:1px solid var(--border);cursor:pointer;transition:all 0.2s;}
  .r-pill.on{border-color:var(--accent);color:var(--accent);}
  .done-badge{font-family:'Kanit',sans-serif;font-size:12px;color:var(--muted);}
  .done-badge span{color:var(--accent);font-weight:700;}

  .match-body-wrap{flex:1;overflow-y:auto;padding:14px 16px;}
  .courts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-bottom:14px;}

  .court-card{background:var(--surface);border-radius:16px;overflow:hidden;border:2px solid var(--border);transition:border-color 0.3s,box-shadow 0.3s;}
  .court-card.live{border-color:var(--accent);box-shadow:0 0 20px rgba(240,192,64,0.15);}
  .court-card.done{border-color:var(--green);opacity:0.75;}

  .court-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;font-family:'Kanit',sans-serif;font-size:13px;font-weight:700;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
  .court-card.live .live-dot{background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 1.5s ease-in-out infinite;}
  .court-card.done .live-dot{background:var(--green);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

  .court-inner{padding:12px 14px;}
  .singles-wrap{display:flex;align-items:stretch;gap:8px;}
  .pbox{flex:1;background:var(--surface2);border-radius:10px;padding:10px;text-align:center;}
  .pbox.W{background:rgba(34,197,94,0.12);border:1px solid var(--green);}
  .pname{font-family:'Kanit',sans-serif;font-size:14px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pscore{font-size:38px;font-family:'Kanit',sans-serif;font-weight:900;color:var(--accent);line-height:1;}
  .vs{font-family:'Kanit',sans-serif;font-weight:900;font-size:12px;color:var(--muted);display:flex;align-items:center;flex-shrink:0;}

  .dbl-wrap{display:flex;flex-direction:column;gap:7px;}
  .trow{display:flex;align-items:center;background:var(--surface2);border-radius:10px;padding:9px 12px;gap:8px;}
  .trow.W{background:rgba(34,197,94,0.12);border:1px solid var(--green);}
  .tnames{flex:1;min-width:0;}
  .tnames .n1{font-family:'Kanit',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tnames .n2{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tscore{font-size:30px;font-family:'Kanit',sans-serif;font-weight:900;color:var(--accent);min-width:38px;text-align:right;}
  .vsdiv{text-align:center;font-size:10px;color:var(--muted);font-family:'Kanit',sans-serif;font-weight:700;}

  .sctrl{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:8px;}
  .sb{width:34px;height:34px;border-radius:8px;border:none;font-size:20px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;font-weight:900;}
  .sbp{background:rgba(240,192,64,0.12);color:var(--accent);border:1px solid rgba(240,192,64,0.25);}
  .sbp:hover{background:rgba(240,192,64,0.25);}
  .sbm{background:rgba(255,255,255,0.04);color:var(--muted);border:1px solid var(--border);}
  .sbm:hover{background:rgba(255,255,255,0.08);color:var(--text);}
  .dbl-sc-col{display:flex;flex-direction:column;gap:3px;}
  .dsb{width:28px;height:28px;border-radius:6px;border:none;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}

  .finish-btn{width:100%;margin-top:10px;padding:8px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);color:var(--green);border-radius:8px;font-family:'Kanit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .finish-btn:hover{background:rgba(34,197,94,0.18);}
  .done-label{text-align:center;font-size:12px;color:var(--green);padding-top:6px;font-weight:700;font-family:'Kanit',sans-serif;}

  .rest-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
  .rest-title{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
  .rest-chips{display:flex;flex-wrap:wrap;gap:6px;}
  .rest-chip{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:4px 10px;font-size:12px;color:var(--muted);}

  /* LEADERBOARD */
  .lb-wrap{padding:14px 16px;}
  .lb-table{width:100%;border-collapse:collapse;}
  .lb-table th{text-align:left;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);font-family:'Kanit',sans-serif;border-bottom:1px solid var(--border);}
  .lb-table td{padding:9px 10px;border-bottom:1px solid rgba(30,58,95,0.4);font-size:13px;}
  .lb-table tr:last-child td{border-bottom:none;}
  .rank{font-family:'Kanit',sans-serif;font-weight:900;color:var(--muted);}
  .r1{color:#ffd700;} .r2{color:#c0c0c0;} .r3{color:#cd7f32;}
  .sn{font-family:'Kanit',sans-serif;font-weight:700;}
  .progress-bar{height:3px;background:var(--border);border-radius:2px;margin:8px 0 14px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.5s ease;}

  /* TAG */
  .tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;font-family:'Kanit',sans-serif;}
  .ts{background:rgba(240,192,64,0.12);color:var(--accent);}
  .td{background:rgba(124,58,237,0.2);color:#a78bfa;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface3);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:14px;color:var(--text);z-index:9999;transition:transform 0.3s ease,opacity 0.3s ease;opacity:0;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 32px);text-align:center;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

  /* SPINNER */
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-box{text-align:center;padding:60px 20px;}
  .loading-box p{color:var(--muted);font-size:14px;margin-top:16px;}

  /* ROLE BADGE */
  .role-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;font-family:'Kanit',sans-serif;}
  .admin-badge{background:rgba(240,192,64,0.15);color:var(--accent);border:1px solid rgba(240,192,64,0.3);}
  .viewer-badge{background:rgba(59,130,246,0.15);color:var(--blue);border:1px solid rgba(59,130,246,0.3);}

  .stat-row{display:flex;gap:12px;flex-wrap:wrap;}
  .stat-box{flex:1;min-width:70px;text-align:center;background:var(--surface2);border-radius:10px;padding:12px 8px;}
  .stat-big{font-size:26px;font-family:'Kanit',sans-serif;font-weight:900;color:var(--accent);}
  .stat-label{font-size:11px;color:var(--muted);margin-top:2px;}

  /* ADMIN ONLY SECTION */
  .admin-only{display:none;}
  body.is-admin .admin-only{display:block;}
  body.is-admin .admin-flex{display:flex !important;}

  .empty-state{text-align:center;padding:40px;color:var(--muted);font-size:14px;line-height:2;}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ===== SCREEN: LOBBY ===== -->
<div class="screen active" id="s-lobby">
  <div class="lobby-box">
    <div class="logo">
      <span class="logo-icon">🏸</span>
      <h1>Badminton Matcher</h1>
      <p>Real-time · แชร์ลิงก์ได้ · นับคะแนนพร้อมกัน</p>
    </div>

    <div class="lobby-card">
      <h2>🆕 สร้างห้องใหม่</h2>
      <div style="margin-bottom:12px;">
        <label>ชื่อคุณ (Admin)</label>
        <input type="text" id="adminName" placeholder="เช่น นัท" maxlength="20">
      </div>
      <button class="btn btn-primary" onclick="createRoom()">สร้างห้อง + จับคู่</button>
    </div>

    <div class="divider">หรือ</div>

    <div class="lobby-card">
      <h2>🔗 เข้าห้องที่มีอยู่</h2>
      <div style="margin-bottom:12px;">
        <label>ชื่อคุณ</label>
        <input type="text" id="joinName" placeholder="เช่น พี่โจ" maxlength="20">
      </div>
      <div style="margin-bottom:14px;">
        <label>Room Code</label>
        <input type="text" id="joinCode" placeholder="เช่น ABC123" maxlength="8" style="text-transform:uppercase;letter-spacing:3px;font-family:'Kanit',sans-serif;font-size:18px;font-weight:700;">
      </div>
      <button class="btn btn-secondary" onclick="joinRoom()">เข้าห้อง</button>
    </div>
    <div id="lobbyError"></div>
  </div>
</div>

<!-- ===== SCREEN: SETUP ===== -->
<div class="screen" id="s-setup">
  <div class="top-bar">
    <div>
      <div style="font-family:'Kanit',sans-serif;font-size:16px;font-weight:700;">⚙️ ตั้งค่าการแข่ง</div>
      <div id="setupRoleBadge" style="margin-top:3px;"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="room-code-badge" onclick="copyRoomLink()" title="คลิกเพื่อ copy ลิงก์">
        🔗 <span id="topRoomCode">------</span>
      </div>
    </div>
  </div>

  <div class="setup-body">
    <div class="tabs">
      <button class="tab active" onclick="setupTab('players')">👥 ผู้เล่น</button>
      <button class="tab" onclick="setupTab('settings')">🎮 ตั้งค่า</button>
    </div>

    <!-- PLAYERS TAB -->
    <div id="st-players">
      <div class="card admin-only">
        <div class="card-title">➕ เพิ่มผู้เล่น</div>
        <div class="player-input-row">
          <input type="text" id="playerInput" placeholder="ชื่อผู้เล่น..." onkeydown="if(event.key==='Enter')addPlayer()">
          <button class="btn btn-sm" onclick="addPlayer()">+ เพิ่ม</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">👥 รายชื่อผู้เล่น <span id="playerCount" style="color:var(--muted);font-weight:400;font-size:13px;"></span></div>
        <div class="players-grid" id="playersList"></div>
      </div>
    </div>

    <!-- SETTINGS TAB -->
    <div id="st-settings" style="display:none;">
      <div class="card admin-only">
        <div class="card-title">🎮 ตั้งค่าการแข่งขัน</div>
        <div class="form-row">
          <div class="form-group">
            <label>ประเภท</label>
            <select id="matchType" onchange="updateNotice()">
              <option value="singles">เดี่ยว (Singles)</option>
              <option value="doubles">คู่ (Doubles)</option>
            </select>
          </div>
          <div class="form-group">
            <label>จำนวนสนาม</label>
            <input type="number" id="numCourts" value="2" min="1" max="6" onchange="updateNotice()">
          </div>
          <div class="form-group">
            <label>จำนวนรอบ</label>
            <input type="number" id="numRounds" value="4" min="1" max="30">
          </div>
        </div>
        <div class="notice" id="setupNotice"></div>
        <div id="setupError"></div>
        <button class="btn btn-primary" id="generateBtn" onclick="generate()">🏸 สร้างตารางแข่งขัน</button>
      </div>
      <div class="card" style="display:none;" id="nonAdminSettings">
        <div class="empty-state">⏳ รอ Admin สร้างตารางแข่ง...</div>
      </div>
    </div>

    <!-- WAITING FOR OTHERS -->
    <div class="card" id="waitingCard" style="display:none;">
      <div class="card-title">👥 ผู้เข้าร่วมห้อง</div>
      <div id="membersList"></div>
    </div>
  </div>
</div>

<!-- ===== SCREEN: MATCH ===== -->
<div class="screen" id="s-match">
  <div class="match-topbar">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <div class="round-pills" id="roundPills"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="done-badge">สำเร็จ <span id="doneCount">0/0</span></div>
      <div class="room-code-badge" onclick="copyRoomLink()" style="font-size:11px;">🔗 <span id="matchRoomCode"></span></div>
    </div>
  </div>
  <div style="height:3px;background:var(--border);"><div class="progress-fill" id="matchProgress" style="width:0%"></div></div>

  <!-- TABS for match view -->
  <div style="display:flex;gap:3px;background:var(--surface);padding:6px 12px;border-bottom:1px solid var(--border);">
    <button class="tab active" id="mt-matches" onclick="matchTab('matches')" style="flex:1;padding:7px;font-size:13px;">🏸 แมตช์</button>
    <button class="tab" id="mt-scores" onclick="matchTab('scores')" style="flex:1;padding:7px;font-size:13px;">🏆 คะแนน</button>
  </div>

  <div style="flex:1;overflow-y:auto;" id="matchMainContent">
    <div class="match-body-wrap" id="matchView">
      <div class="courts-grid" id="courtsGrid"></div>
      <div id="restSection"></div>
    </div>
    <div class="lb-wrap" id="scoresView" style="display:none;">
      <div class="card" style="margin-bottom:14px;">

        <div class="card-title">📊 สถิติ</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZQbNnKojJy3dN5XlnqqOTrbXOYI1BLdQ",
  authDomain: "badminton-matcher-8ce64.firebaseapp.com",
  databaseURL: "https://badminton-matcher-8ce64-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "badminton-matcher-8ce64",
  storageBucket: "badminton-matcher-8ce64.firebasestorage.app",
  messagingSenderId: "145061831052",
  appId: "1:145061831052:web:60b6b4deefc27d47c676a9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ============ STATE ============
let roomCode = '';
let myName = '';
let isAdmin = false;
let roomData = null;
let currentRound = 0;
let unsubscribe = null;

// ============ UTILS ============
function showToast(msg, duration=2500){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration);
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c='';
  for(let i=0;i<6;i++) c+=chars[Math.floor(Math.random()*chars.length)];
  return c;
}

function setAdminMode(v){
  isAdmin = v;
  if(v) document.body.classList.add('is-admin');
  else document.body.classList.remove('is-admin');
}

// ============ LOBBY ============
window.createRoom = async function(){
  const name = document.getElementById('adminName').value.trim();
  if(!name){ showToast('⚠️ กรุณาใส่ชื่อก่อนครับ'); return; }
  myName = name;
  roomCode = genCode();
  setAdminMode(true);

  const roomRef = ref(db, `rooms/${roomCode}`);
  await set(roomRef, {
    createdAt: Date.now(),
    adminName: myName,
    players: [],
    settings: { type:'singles', courts:2, rounds:4 },
    schedule: null,
    members: { [myName]: { name: myName, role:'admin', joinedAt: Date.now() } }
  });

  // Check URL for auto-redirect after creating
  const url = new URL(window.location.href);
  url.searchParams.set('room', roomCode);
  window.history.replaceState({}, '', url.toString());

  enterRoom();
}

window.joinRoom = async function(){
  const name = document.getElementById('joinName').value.trim();
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  const errEl = document.getElementById('lobbyError');
  errEl.innerHTML='';

  if(!name){ showToast('⚠️ กรุณาใส่ชื่อก่อนครับ'); return; }
  if(!code){ showToast('⚠️ กรุณาใส่ Room Code'); return; }

  const snap = await get(ref(db, `rooms/${code}`));
  if(!snap.exists()){
    errEl.innerHTML='<div class="error-msg">❌ ไม่พบ Room Code นี้ครับ</div>';
    return;
  }

  myName = name;
  roomCode = code;
  setAdminMode(false);

  // Add member
  await update(ref(db, `rooms/${roomCode}/members/${myName}`), {
    name: myName, role:'viewer', joinedAt: Date.now()
  });

  const url = new URL(window.location.href);
  url.searchParams.set('room', roomCode);
  window.history.replaceState({}, '', url.toString());

  enterRoom();
}

function enterRoom(){
  document.getElementById('topRoomCode').textContent = roomCode;
  document.getElementById('matchRoomCode').textContent = roomCode;

  const badge = document.getElementById('setupRoleBadge');
  if(isAdmin){
    badge.innerHTML = '<span class="role-badge admin-badge">⭐ Admin</span>';
  } else {
    badge.innerHTML = `<span class="role-badge viewer-badge">👁 ${myName}</span>`;
  }

  // Hide non-admin settings card, show admin card
  if(!isAdmin){
    document.getElementById('nonAdminSettings').style.display='block';
    const adminSettingsCard = document.querySelector('#st-settings .admin-only');
    if(adminSettingsCard) adminSettingsCard.style.display='none';
  }

  subscribeRoom();
  showScreen('s-setup');
  updateNotice();
}

// ============ REALTIME SUBSCRIPTION ============
function subscribeRoom(){
  if(unsubscribe) unsubscribe();
  const roomRef = ref(db, `rooms/${roomCode}`);
  unsubscribe = onValue(roomRef, snap => {
    if(!snap.exists()) return;
    roomData = snap.val();
    onRoomUpdate();
  });
}

function onRoomUpdate(){
  if(!roomData) return;
  renderMembers();
  renderPlayersList();

  if(roomData.schedule){
    // Go to match screen
    showScreen('s-match');
    renderMatchScreen();
    renderLB();
  }
}

// ============ MEMBERS ============
function renderMembers(){
  const members = roomData.members || {};
  const list = Object.values(members);
  const el = document.getElementById('membersList');
  if(!el) return;
  el.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:8px;">
    ${list.map(m=>`
      <div style="display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:5px 11px;font-size:13px;">
        ${m.role==='admin'?'⭐':'👤'} ${m.name}
      </div>
    `).join('')}
  </div>`;
  document.getElementById('waitingCard').style.display='block';
}

// ============ PLAYERS ============
window.addPlayer = async function(){
  if(!isAdmin) return;
  const inp = document.getElementById('playerInput');
  const n = inp.value.trim();
  if(!n) return;
  const players = roomData.players || [];
  if(players.includes(n)){ inp.value=''; showToast('มีชื่อนี้แล้วครับ'); return; }
  players.push(n);
  await update(ref(db,`rooms/${roomCode}`), {players});
  inp.value='';
}

window.removePlayer = async function(i){
  if(!isAdmin) return;
  const players = [...(roomData.players||[])];
  players.splice(i,1);
  await update(ref(db,`rooms/${roomCode}`), {players});
}

function renderPlayersList(){
  const players = roomData?.players || [];
  const el = document.getElementById('playersList');
  if(!el) return;
  document.getElementById('playerCount').textContent = `(${players.length} คน)`;
  if(!players.length){
    el.innerHTML='<span style="color:var(--muted);font-size:13px">ยังไม่มีผู้เล่น</span>';
    return;
  }
  el.innerHTML = players.map((p,i)=>`
    <div class="player-chip">
      <span class="num">#${i+1}</span>${p}
      ${isAdmin?`<span class="del" onclick="removePlayer(${i})">×</span>`:''}
    </div>
  `).join('');
}

// ============ SETUP ============
window.setupTab = function(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['players','settings'][i]===t));
  document.getElementById('st-players').style.display = t==='players'?'block':'none';
  document.getElementById('st-settings').style.display = t==='settings'?'block':'none';
}

window.updateNotice = function(){
  const t = document.getElementById('matchType')?.value||'singles';
  const c = parseInt(document.getElementById('numCourts')?.value)||2;
  const pp = t==='singles'?2:4;
  const need = pp*c+1;
  const el = document.getElementById('setupNotice');
  if(el) el.textContent=`ต้องการผู้เล่นอย่างน้อย ${need} คน (${c} สนาม × ${pp} คน + อย่างน้อย 1 คนพัก)`;
}

// ============ GENERATE ============
function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
function pairKey(a,b){ return [a,b].sort().join('||'); }
function teamKey(a,b){ return 'T:'+[a,b].sort().join('||'); }

window.generate = async function(){
  if(!isAdmin) return;
  const type = document.getElementById('matchType').value;
  const courts = parseInt(document.getElementById('numCourts').value);
  const rounds = parseInt(document.getElementById('numRounds').value);
  const errEl = document.getElementById('setupError');
  errEl.innerHTML='';

  const players = roomData.players||[];
  const pp = type==='singles'?2:4;
  const minP = pp*courts+1;

  if(players.length < minP){
    errEl.innerHTML=`<div class="error-msg">⚠️ ต้องการผู้เล่นอย่างน้อย ${minP} คน (มี ${players.length} คน)</div>`;
    return;
  }

  const pairHist = new Set();
  const sched = [];
  let failAt = -1;

  for(let r=0;r<rounds;r++){
    const round = buildRound(type,courts,pp,players,pairHist,300);
    if(!round){ failAt=r; break; }
    round.forEach(m=>{
      if(type==='singles') pairHist.add(pairKey(m.team1[0],m.team2[0]));
      else {
        pairHist.add(teamKey(m.team1[0],m.team1[1]));
        pairHist.add(teamKey(m.team2[0],m.team2[1]));
        m.team1.forEach(a=>m.team2.forEach(b=>pairHist.add(pairKey(a,b))));
      }
    });
    sched.push(round.map((m,i)=>({...m,court:i+1,score1:0,score2:0,done:false,active:false})));
  }

  if(failAt===0){ errEl.innerHTML=`<div class="error-msg">⚠️ ไม่สามารถสร้างตารางได้</div>`; return; }
  if(failAt>0){ errEl.innerHTML=`<div class="error-msg">⚠️ สร้างได้ ${failAt} รอบ (คู่หมดแล้ว)</div>`; }

  // Push to Firebase
  await update(ref(db,`rooms/${roomCode}`), {
    schedule: sched,
    settings: { type, courts, rounds: sched.length }
  });
}

function buildRound(type,courts,pp,players,pairHist,maxTry){
  for(let t=0;t<maxTry;t++){
    const sh=shuffle(players), sel=sh.slice(0,courts*pp), matches=[];
    let ok=true;
    for(let i=0;i<courts;i++){
      const chunk=sel.slice(i*pp,(i+1)*pp);
      if(type==='singles'){
        const k=pairKey(chunk[0],chunk[1]);
        if(pairHist.has(k)){ok=false;break;}
        matches.push({type:'singles',team1:[chunk[0]],team2:[chunk[1]]});
      } else {
        const t1=[chunk[0],chunk[1]],t2=[chunk[2],chunk[3]];
        if(pairHist.has(teamKey(t1[0],t1[1]))||pairHist.has(teamKey(t2[0],t2[1]))){ok=false;break;}
        let oppOk=true;
        for(const a of t1) for(const b of t2) if(pairHist.has(pairKey(a,b))){oppOk=false;break;}
        if(!oppOk){ok=false;break;}
        matches.push({type:'doubles',team1:t1,team2:t2});
      }
    }
    if(ok&&matches.length===courts) return matches;
  }
  return null;
}

// ============ MATCH SCREEN ============
function renderMatchScreen(){
  if(!roomData?.schedule) return;
  const sched = roomData.schedule;
  const done = sched.flat().filter(m=>m.done).length;
  const total = sched.flat().length;

  document.getElementById('doneCount').textContent = `${done}/${total}`;
  document.getElementById('matchProgress').style.width = total?`${done/total*100}%`:'0%';

  // Round pills
  const pills = document.getElementById('roundPills');
  pills.innerHTML = sched.map((_,i)=>`
    <button class="r-pill ${i===currentRound?'on':''}" onclick="goRound(${i})">รอบ ${i+1}</button>
  `).join('');

  renderRoundContent();
}

window.goRound = function(r){ currentRound=r; renderMatchScreen(); }

function h2r(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
const CC=['#0e6bbf','#7c3aed','#0f766e','#b45309','#be123c','#065f46'];

function renderRoundContent(){
  const sched = roomData?.schedule;
  if(!sched) return;
  const round = sched[currentRound];
  const playing = round.flatMap(m=>[...m.team1,...m.team2]);
  const resting = (roomData.players||[]).filter(p=>!playing.includes(p));

  let html='';
  round.forEach((m,mi)=>{ html+=renderCourtHTML(m,currentRound,mi); });
  document.getElementById('courtsGrid').innerHTML=html;

  const restEl = document.getElementById('restSection');
  if(resting.length){
    restEl.innerHTML=`<div class="rest-card"><div class="rest-title">💤 พักรอบนี้</div><div class="rest-chips">${resting.map(p=>`<div class="rest-chip">${p}</div>`).join('')}</div></div>`;
  } else restEl.innerHTML='';
}

function renderCourtHTML(m,r,mi){
  const cc=CC[(m.court-1)%CC.length];
  const cls=m.done?'done':(m.active?'live':'');
  let body='';

  if(m.type==='singles'){
    const w1=m.done&&m.score1>m.score2, w2=m.done&&m.score2>m.score1;
    const c1=!m.done?`<div class="sctrl"><button class="sb sbm" onclick="sc(${r},${mi},1,-1)">−</button><button class="sb sbp" onclick="sc(${r},${mi},1,1)">+</button></div>`:'';
    const c2=!m.done?`<div class="sctrl"><button class="sb sbm" onclick="sc(${r},${mi},2,-1)">−</button><button class="sb sbp" onclick="sc(${r},${mi},2,1)">+</button></div>`:'';
    body=`<div class="singles-wrap">
      <div class="pbox ${w1?'W':''}"><div class="pname">${m.team1[0]}</div><div class="pscore">${m.score1}</div>${c1}</div>
      <div class="vs">VS</div>
      <div class="pbox ${w2?'W':''}"><div class="pname">${m.team2[0]}</div><div class="pscore">${m.score2}</div>${c2}</div>
    </div>`;
  } else {
    const w1=m.done&&m.score1>m.score2, w2=m.done&&m.score2>m.score1;
    const c1=!m.done?`<div class="dbl-sc-col"><button class="dsb sbp" onclick="sc(${r},${mi},1,1)" style="font-size:14px;">+</button><button class="dsb sbm" onclick="sc(${r},${mi},1,-1)" style="font-size:14px;">−</button></div>`:'';
    const c2=!m.done?`<div class="dbl-sc-col"><button class="dsb sbp" onclick="sc(${r},${mi},2,1)" style="font-size:14px;">+</button><button class="dsb sbm" onclick="sc(${r},${mi},2,-1)" style="font-size:14px;">−</button></div>`:'';
    body=`<div class="dbl-wrap">
      <div class="trow ${w1?'W':''}"><div class="tnames"><div class="n1">${m.team1[0]}</div><div class="n2">& ${m.team1[1]}</div></div><div class="tscore">${m.score1}</div>${c1}</div>
      <div class="vsdiv">VS</div>
      <div class="trow ${w2?'W':''}"><div class="tnames"><div class="n1">${m.team2[0]}</div><div class="n2">& ${m.team2[1]}</div></div><div class="tscore">${m.score2}</div>${c2}</div>
    </div>`;
  }

  const footer = m.done
    ? `<div class="done-label">✔ จบแล้ว</div>`
    : `<button class="finish-btn" onclick="finish(${r},${mi})">✅ จบเกม</button>`;

  return `<div class="court-card ${cls}">
    <div class="court-hdr" style="background:${h2r(cc,0.2)};border-bottom:1px solid ${h2r(cc,0.35)};">
      <span>🏸 สนาม ${m.court}</span>
      <div style="display:flex;align-items:center;gap:7px;">
        <span class="tag ${m.type==='singles'?'ts':'td'}">${m.type==='singles'?'เดี่ยว':'คู่'}</span>
        <div class="live-dot"></div>
      </div>
    </div>
    <div class="court-inner">${body}${footer}</div>
  </div>`;
}

// ============ SCORE / FINISH (write to Firebase) ============
window.sc = async function(r,mi,team,d){
  const m = roomData.schedule[r][mi];
  if(m.done) return;
  const path = `rooms/${roomCode}/schedule/${r}/${mi}`;
  const updates = { [`${path}/active`]: true };
  if(team===1) updates[`${path}/score1`] = Math.max(0, (m.score1||0)+d);
  else updates[`${path}/score2`] = Math.max(0, (m.score2||0)+d);
  await update(ref(db), updates);
}

window.finish = async function(r,mi){
  const path = `rooms/${roomCode}/schedule/${r}/${mi}`;
  await update(ref(db), {
    [`${path}/done`]: true,
    [`${path}/active`]: false
  });
  showToast('✅ จบเกมแล้ว!');
}

// ============ LEADERBOARD ============
function renderLB(){
  const players = roomData?.players||[];
  const sched = roomData?.schedule||[];
  const st={};
  players.forEach(p=>st[p]={w:0,l:0,d:0,pts:0,scored:0,con:0});

  sched.forEach(round=>round.forEach(m=>{
    if(!m.done)return;
    const s1=m.score1||0, s2=m.score2||0;
    m.team1.forEach(p=>{st[p].scored+=s1;st[p].con+=s2;});
    m.team2.forEach(p=>{st[p].scored+=s2;st[p].con+=s1;});
    const w=s1>s2?m.team1:(s2>s1?m.team2:null);
    const l=s1>s2?m.team2:(s2>s1?m.team1:null);
    if(w){w.forEach(p=>{st[p].w++;st[p].pts+=3;});l.forEach(p=>st[p].l++);}
    else[...m.team1,...m.team2].forEach(p=>{st[p].d++;st[p].pts+=1;});
  }));

  const sorted=players.slice().sort((a,b)=>{
    if(st[b].pts!==st[a].pts)return st[b].pts-st[a].pts;
    return(st[b].scored-st[b].con)-(st[a].scored-st[a].con);
  });
  const em=['🥇','🥈','🥉'];
  const hasData=sorted.some(p=>st[p].w+st[p].l+st[p].d>0);
  const done=sched.flat().filter(m=>m.done).length;
  const total=sched.flat().length;

  document.getElementById('lbContent').innerHTML = !hasData
    ? '<div class="empty-state">ยังไม่มีเกมที่จบ</div>'
    : `<table class="lb-table">
        <thead><tr><th>#</th><th>ผู้เล่น</th><th>แต้ม</th><th>ชนะ</th><th>แพ้</th><th>เสมอ</th><th>+/−</th></tr></thead>
        <tbody>${sorted.map((p,i)=>{const s=st[p],diff=s.scored-s.con;return`<tr>
          <td class="rank ${i<3?'r'+(i+1):''}">${i<3?em[i]:i+1}</td>
          <td><strong>${p}</strong></td>
          <td class="sn" style="color:var(--accent)">${s.pts}</td>
          <td class="sn" style="color:var(--green)">${s.w}</td>
          <td class="sn" style="color:var(--red)">${s.l}</td>
          <td class="sn" style="color:var(--muted)">${s.d}</td>
          <td class="sn" style="color:${diff>=0?'var(--green)':'var(--red)'}">${diff>=0?'+':''}${diff}</td>
        </tr>`}).join('')}</tbody>
      </table>`;

  document.getElementById('statsRow').innerHTML=`
    <div class="stat-box"><div class="stat-big">${done}</div><div class="stat-label">เกมที่จบ</div></div>
    <div class="stat-box"><div class="stat-big">${total}</div><div class="stat-label">เกมทั้งหมด</div></div>
    <div class="stat-box"><div class="stat-big">${sched.length}</div><div class="stat-label">รอบ</div></div>
    <div class="stat-box"><div class="stat-big">${players.length}</div><div class="stat-label">ผู้เล่น</div></div>
  `;
}

  document.getElementById('mt-scores').classList.toggle('active',t==='scores');

  document.getElementById('scoresView').style.display = t==='scores'?'block':'none';
